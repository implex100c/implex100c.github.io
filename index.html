<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guilty Pleasure</title>
  <style>
    :root {
      color-scheme: dark;
    }

    body {
      font-family: sans-serif;
      margin: 0;
      padding: 1rem;
      padding-bottom: 2.75rem;
      background: #121212;
      color: #e0e0e0;
    }

    .hidden {
      display: none;
    }

    input,
    button,
    select {
      font-size: 1rem;
      padding: 0.5rem;
      margin: 0.5rem 0;
      width: 100%;
      box-sizing: border-box;
    }

    #lobby,
    #movie-entry,
    #quiz,
    #results {
      max-width: 600px;
      margin: auto;
    }

    label {
      display: block;
      margin-bottom: 0.25rem;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin: 1rem 0;
    }

    th,
    td {
      border: 1px solid #333;
      padding: 0.5rem;
      text-align: left;
    }

    th {
      background: #1f1f1f;
    }

    button {
      background: #333;
      color: #e0e0e0;
      border: none;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    th:last-child,
    td:last-child {
      text-align: center;
    }

    .error-text {
      color: #ff6b6b;
    }

    .site-meta {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      margin: 0;
      padding: 0.45rem 0.75rem;
      font-size: 0.75rem;
      color: #c7c7c7;
      background: rgba(18, 18, 18, 0.92);
      border-top: 1px solid #2b2b2b;
      text-align: center;
      z-index: 1000;
    }
  </style>
</head>

<body>
  <div id="lobby">
    <h1>Guilty Pleasure Movie</h1>
    <label for="numPlayers">Number of players:</label>
    <input type="number" id="numPlayers" min="2" value="2" />
    <div id="playerNames"></div>
    <button id="startBtn">Start Game</button>
  </div>

  <div id="movie-entry" class="hidden">
    <h1>Enter Guilty-Pleasure Movies</h1>
    <p id="movie-prompt"></p>
    <input type="text" id="movieTitle" placeholder="Movie Title" />
    <button id="searchBtn" disabled>Search</button>
    <button id="confirmBtn" disabled>Confirm</button>
    <div id="searchResults"></div>
  </div>

  <div id="quiz" class="hidden">
    <h1>Quiz</h1>
    <p id="yearPrompt"></p>
    <p id="ratingPrompt"></p>
    <table>
      <tbody id="quizTableBody"></tbody>
    </table>
    <button id="nextQuizBtn">Next</button>
  </div>

  <div id="results" class="hidden">
    <h1>Results</h1>
    <div id="resultsList"></div>
    <button id="restartBtn">Restart Game</button>
  </div>

  <footer class="site-meta">Version 1.1.0 | Last updated March 1, 2026</footer>

  <script type="module" src="./js/main.js"></script>
</body>

</html>

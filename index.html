<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guilty Pleasure</title>
  <style>
    :root {
      color-scheme: dark;
      --space-1: 0.5rem;
      --space-2: 0.75rem;
      --space-3: 1rem;
      --space-4: 1.25rem;
      --radius: 6px;
      --surface: #161616;
      --surface-soft: #1f1f1f;
      --border: #2a2a2a;
      --muted: #b3b3b3;
      --text: #ffffff;
      --accent: #e50914;
      --accent-press: #b20710;
      --success: #46d369;
      --danger: #ff6b6b;
    }

    body {
      font-family: "Helvetica Neue", "Segoe UI", Arial, sans-serif;
      margin: 0;
      padding: 1rem;
      padding-bottom: 2.75rem;
      background: #0b0b0b;
      color: var(--text);
    }

    .hidden {
      display: none;
    }

    input,
    button,
    select {
      font-size: 1rem;
      padding: 0.625rem 0.75rem;
      margin: 0.5rem 0;
      width: 100%;
      box-sizing: border-box;
      border-radius: var(--radius);
    }

    button,
    input,
    select {
      min-height: 44px;
    }

    #lobby,
    #movie-entry,
    #quiz,
    #results {
      max-width: 600px;
      margin: auto;
      background: #0f0f0f;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1rem;
    }

    h1 {
      margin-top: 0;
      margin-bottom: 0.9rem;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    label {
      display: block;
      margin-bottom: 0.25rem;
      color: #e5e5e5;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin: 1rem 0;
      background: rgba(20, 20, 20, 0.9);
    }

    th,
    td {
      border: 1px solid var(--border);
      padding: 0.5rem;
      text-align: left;
    }

    th {
      background: linear-gradient(180deg, #222 0%, #191919 100%);
      color: #f5f5f5;
    }

    button {
      background: linear-gradient(180deg, var(--accent) 0%, var(--accent-press) 100%);
      color: #fff;
      border: 1px solid #7a0d12;
      cursor: pointer;
      font-weight: 700;
      transition: filter 140ms ease, transform 120ms ease;
    }

    button:hover:not(:disabled) {
      filter: brightness(1.07);
      transform: translateY(-1px);
    }

    button:disabled {
      background: #2e2e2e;
      color: #8f8f8f;
      border-color: #3c3c3c;
      cursor: not-allowed;
    }

    input,
    select {
      background: #2b2b2b;
      color: #fff;
      border: 1px solid #5c5c5c;
    }

    input:focus,
    select:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(229, 9, 20, 0.35);
    }

    th:last-child,
    td:last-child {
      text-align: center;
    }

    .error-text {
      color: var(--danger);
    }

    #quiz table {
      table-layout: fixed;
    }

    #quiz th {
      width: 220px;
      white-space: nowrap;
    }

    #quiz th,
    #quiz td {
      height: 52px;
      vertical-align: middle;
      box-sizing: border-box;
    }

    #quiz td {
      text-align: left;
      word-break: break-word;
    }

    #quiz td:last-child {
      text-align: left;
    }

    #quiz input[type="checkbox"] {
      width: auto;
      padding: 0;
      margin: 0;
    }

    #quiz-questions {
      margin: 0.5rem 0 1rem 1.25rem;
      padding: 0;
    }

    #quiz-questions li {
      margin: 0.4rem 0;
    }

    .quiz-movie {
      margin: 0 0 var(--space-3);
      color: #d6d6d6;
      font-size: 1.1rem;
      font-weight: 650;
    }

    .quiz-fields {
      margin: 0;
      padding-left: 1.25rem;
    }

    .quiz-fields li {
      margin-bottom: var(--space-3);
    }

    .quiz-fields label {
      margin-bottom: var(--space-1);
      font-weight: 600;
    }

    .quiz-hint {
      margin: 0;
      font-size: 0.85rem;
      color: var(--muted);
    }

    .field-error {
      margin-top: 0.35rem;
      margin-bottom: 0;
      font-size: 0.85rem;
      color: var(--danger);
      min-height: 1em;
    }

    .site-meta {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      margin: 0;
      padding: 0.5rem 0.75rem;
      font-size: 0.75rem;
      color: #8f8f8f;
      background: rgba(0, 0, 0, 0.92);
      border-top: 1px solid var(--border);
      text-align: center;
      z-index: 1000;
    }

    .footer-actions {
      max-width: 600px;
      margin: 0 auto 0.35rem;
      display: grid;
      grid-template-columns: 1fr;
      gap: 0.4rem;
    }

    .footer-action {
      margin: 0;
      min-height: 40px;
      font-size: 0.95rem;
      padding: 0.45rem 0.7rem;
    }

    .site-meta-text {
      font-size: 0.75rem;
      line-height: 1.2;
    }

    .mark-correct {
      color: var(--success);
      font-weight: 700;
    }

    .mark-incorrect {
      color: var(--danger);
      font-weight: 700;
    }

    .movie-link {
      color: #ffffff;
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    .movie-link:hover {
      color: #ffdbdd;
    }

    .results-cards {
      display: none;
    }

    .result-card {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: #121212;
      padding: 0.75rem;
      margin: 0.65rem 0;
    }

    .result-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
      font-weight: 700;
    }

    .result-card-row {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 0.75rem;
      margin: 0.3rem 0;
      font-size: 0.95rem;
    }

    .result-card-key {
      color: var(--muted);
      flex: 0 0 auto;
    }

    .result-card-value {
      text-align: right;
      flex: 1 1 auto;
      word-break: break-word;
    }

    #searchResults {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    .search-options {
      margin-top: 0.75rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .search-option {
      display: grid;
      grid-template-columns: auto 1fr;
      align-items: center;
      gap: 0.75rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.75rem;
      background: #141414;
      cursor: pointer;
    }

    .search-option:hover {
      border-color: #4a4a4a;
      background: #181818;
    }

    .search-option input[type="radio"] {
      width: 1.1rem;
      height: 1.1rem;
      margin: 0;
      min-height: 0;
      accent-color: var(--accent);
    }

    .search-option.selected {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px rgba(229, 9, 20, 0.35);
      background: #1a1213;
    }

    .search-option-title {
      font-weight: 650;
      line-height: 1.25;
      word-break: break-word;
    }

    .search-option-meta {
      font-size: 0.85rem;
      color: var(--muted);
      margin-top: 0.2rem;
    }

    @media (max-width: 600px) {
      body {
        padding: 0.75rem;
        padding-bottom: 2.75rem;
      }

      #lobby,
      #movie-entry,
      #quiz,
      #results {
        padding: 0.8rem;
        border-radius: 8px;
      }

      h1 {
        font-size: 2rem;
        line-height: 1.1;
        margin-bottom: 0.75rem;
      }

      label {
        font-size: 0.97rem;
        line-height: 1.35;
      }

      .quiz-movie {
        font-size: 1rem;
      }

      .quiz-fields {
        padding-left: 1rem;
      }

      .quiz-fields li {
        margin-bottom: 0.85rem;
      }

      .site-meta {
        font-size: 0.68rem;
      }

      .footer-action {
        min-height: 38px;
        font-size: 0.92rem;
      }

      #results table {
        display: none;
      }

      .results-cards {
        display: block;
      }
    }

    /* Stage action buttons are rendered in sticky footer */
    #startBtn,
    #confirmBtn,
    #nextQuizBtn,
    #restartBtn {
      display: none;
    }
  </style>
</head>

<body>
  <div id="lobby">
    <h1>Guilty Pleasure Movie</h1>
    <label for="numPlayers">Number of players:</label>
    <input type="number" id="numPlayers" min="2" value="2" />
    <div id="playerNames"></div>
    <button id="startBtn">Start Game</button>
  </div>

  <div id="movie-entry" class="hidden">
    <h1 id="movieEntryTitle">Enter Guilty-Pleasure Movies</h1>
    <p id="movie-prompt"></p>
    <input type="text" id="movieTitle" placeholder="Movie Title" />
    <button id="searchBtn" disabled>Search</button>
    <button id="confirmBtn" disabled>Confirm</button>
    <div id="searchResults"></div>
  </div>

  <div id="quiz" class="hidden">
    <h1 id="quizTitle">Quiz</h1>
    <p id="quizMoviePrompt" class="quiz-movie"></p>
    <ol class="quiz-fields">
      <li>
        <label for="yearGuessInput" id="yearPrompt">What year was this movie released?</label>
        <input type="number" id="yearGuessInput" min="1900" placeholder="e.g. 2001" inputmode="numeric" />
        <p id="yearError" class="field-error"></p>
      </li>
      <li>
        <label for="ratingGuessInput" id="ratingPrompt">What rating out of 10 does this movie have?</label>
        <input type="number" id="ratingGuessInput" min="0" max="10" step="0.1" placeholder="e.g. 7.7" inputmode="decimal" />
        <p id="ratingError" class="field-error"></p>
      </li>
    </ol>
    <button id="nextQuizBtn">Next</button>
  </div>

  <div id="results" class="hidden">
    <h1>Results</h1>
    <div id="resultsList"></div>
    <button id="restartBtn">Restart Game</button>
  </div>

  <footer class="site-meta">
    <div class="footer-actions">
      <button id="footerStartBtn" class="footer-action">Start Game</button>
      <button id="footerConfirmBtn" class="footer-action" disabled>Confirm</button>
      <button id="footerNextBtn" class="footer-action">Next</button>
      <button id="footerRestartBtn" class="footer-action">Restart Game</button>
    </div>
    <div class="site-meta-text">Version 1.2.1 | Last updated March 1, 2026</div>
  </footer>

  <script type="module" src="./js/main.js"></script>
</body>

</html>

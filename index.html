<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guilty Pleasure</title>
  <link rel="stylesheet" href="./styles.css">
</head>

<body>
  <div id="lobby">
    <h1>Guilty Pleasure Movie</h1>
    <label for="numPlayers">Number of players:</label>
    <input type="number" id="numPlayers" min="2" value="2" />
    <div id="playerNames"></div>
    <button id="startBtn">Start</button>
  </div>

  <div id="movie-entry" class="hidden">
    <h1 id="movieEntryTitle">Enter Guilty-Pleasure Movies</h1>
    <p id="movie-prompt"></p>
    <input type="text" id="movieTitle" placeholder="Movie Title" />
    <button id="searchBtn" disabled>Search</button>
    <button id="confirmBtn" disabled>Confirm</button>
    <div id="searchResults"></div>
  </div>

  <div id="quiz" class="hidden">
    <h1 id="quizTitle">Quiz</h1>
    <p id="quizMoviePrompt" class="quiz-movie"></p>
    <ol class="quiz-fields">
      <li>
        <label for="yearGuessInput" id="yearPrompt">What year was this movie released?</label>
        <input type="number" id="yearGuessInput" min="1900" placeholder="e.g. 2001" inputmode="numeric" />
        <p id="yearError" class="field-error"></p>
      </li>
      <li>
        <label for="ratingGuessInput" id="ratingPrompt">What rating out of 10 does this movie have?</label>
        <input type="number" id="ratingGuessInput" min="0" max="10" step="0.1" placeholder="e.g. 7.7" inputmode="decimal" />
        <p id="ratingError" class="field-error"></p>
      </li>
    </ol>
    <button id="nextQuizBtn">Next</button>
  </div>

  <div id="results" class="hidden">
    <h1>Results</h1>
    <div id="resultsList"></div>
    <button id="restartBtn">Restart</button>
  </div>

  <footer class="site-meta">v1.3.0 | 2026-03-01T23:13:54Z</footer>

  <script type="module" src="./js/main.js"></script>
</body>

</html>

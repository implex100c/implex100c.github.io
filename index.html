<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guilty Pleasure</title>
  <style>
    body {
      font-family: sans-serif;
      margin: 0;
      padding: 1rem;
    }

    .hidden {
      display: none;
    }

    input,
    button,
    select {
      font-size: 1rem;
      padding: 0.5rem;
      margin: 0.5rem 0;
      width: 100%;
      box-sizing: border-box;
    }

    #lobby,
    #movie-entry,
    #quiz,
    #results {
      max-width: 600px;
      margin: auto;
    }

    label {
      display: block;
      margin-bottom: 0.25rem;
    }

    #searchResults label {
      display: block;
      margin: 0.25rem 0;
    }

    /* Dark mode and table styling */
    body {
      background: #121212;
      color: #e0e0e0;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin: 1rem 0;
    }

    th,
    td {
      border: 1px solid #333;
      padding: 0.5rem;
      text-align: left;
    }

    th {
      background: #1f1f1f;
    }

    button {
      background: #333;
      color: #e0e0e0;
      border: none;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Auto-fit first column to content */
    table {
      table-layout: auto;
    }

    th:first-child,
    td:first-child {
      white-space: nowrap;
    }

    /* Center-align second (value) column */
    th:last-child,
    td:last-child {
      text-align: center;
    }
  </style>
</head>

<body>

  <!-- Lobby Screen -->
  <div id="lobby">
    <h1>Guilty Pleasure Movie</h1>
    <label for="numPlayers">Number of players:</label>
    <input type="number" id="numPlayers" min="2" value="2" />
    <div id="playerNames"></div>
    <button id="startBtn">Start Game</button>
  </div>

  <!-- Movie Entry Screen -->
  <div id="movie-entry" class="hidden">
    <h1>Enter Guilty-Pleasure Movies</h1>
    <p id="movie-prompt"></p>
    <input type="text" id="movieTitle" placeholder="Movie Title" />
    <button id="searchBtn">Search</button>
    <button id="confirmBtn" disabled>Confirm</button>
    <div id="searchResults"></div>
  </div>

  <!-- Quiz Screen -->
  <div id="quiz" class="hidden">
    <h1>Quiz</h1>
    <p id="yearPrompt"></p>
    <p id="ratingPrompt"></p>
    <table>
      <tbody></tbody>
    </table>
    <button id="nextQuizBtn">Next</button>
  </div>

  <!-- Results Screen -->
  <div id="results" class="hidden">
    <h1>Results</h1>
    <div id="resultsList"></div>
    <button id="restartBtn">Restart Game</button>
  </div>

  <script>
    let moviesData = [];
    let players = [];
    let movies = [];
    let currentCaptainIndex = 0;
    let currentMovieIndex = 0;
    let isSelecting = false;
    let currentMatches = [];

    // Elements
    const lobbyEl = document.getElementById('lobby');
    const namesContainer = document.getElementById('playerNames');
    const startBtn = document.getElementById('startBtn');
    const movieEntryEl = document.getElementById('movie-entry');
    const moviePromptEl = document.getElementById('movie-prompt');
    const movieTitleInput = document.getElementById('movieTitle');
    const searchBtn = document.getElementById('searchBtn');
    const confirmBtn = document.getElementById('confirmBtn');
    const searchResultsEl = document.getElementById('searchResults');
    const quizEl = document.getElementById('quiz');
    const resultsEl = document.getElementById('results');
    const yearPromptEl = document.getElementById('yearPrompt');
    const ratingPromptEl = document.getElementById('ratingPrompt');

    // Load the movies.json file (place it next to index.html)
    fetch('movies.json')
      .then(res => res.json())
      .then(data => {
        moviesData = data;
        console.log(`Loaded ${moviesData.length} movies.`);
      })
      .catch(err => console.error('Failed to load movies.json', err));

    // --- Phase 1: Lobby Screen Logic ---
    document.getElementById('numPlayers').addEventListener('input', generateNameInputs);
    function generateNameInputs() {
      // Preserve any existing player name inputs
      const oldValues = Array.from(namesContainer.querySelectorAll('input[id^="player-"]')).map(i => i.value);
      const num = parseInt(document.getElementById('numPlayers').value) || 0;
      namesContainer.innerHTML = '';
      for (let i = 0; i < num; i++) {
        const label = document.createElement('label');
        label.textContent = `Player ${i + 1} Name:`;
        const input = document.createElement('input');
        input.type = 'text';
        input.id = `player-${i}`;
        input.placeholder = `Player ${i + 1}`;
        // Restore previously entered name if still available
        input.value = oldValues[i] || '';
        namesContainer.appendChild(label);
        namesContainer.appendChild(input);
      }
    }
    generateNameInputs();

    startBtn.addEventListener('click', () => {
      const num = parseInt(document.getElementById('numPlayers').value);
      players = [];
      for (let i = 0; i < num; i++) {
        const name = document.getElementById(`player-${i}`).value.trim() || `Player ${i + 1}`;
        players.push({ name });
      }
      lobbyEl.classList.add('hidden');
      movieEntryEl.classList.remove('hidden');
      initMovieEntry();
    });

    // --- Phase 2: Movie Entry with Lookup ---
    function initMovieEntry() {
      movies = [];
      currentMovieIndex = 0;
      isSelecting = false;
      currentMatches = [];
      // Reset buttons
      confirmBtn.disabled = true;
      searchBtn.disabled = false;
      searchResultsEl.innerHTML = '';
      showNextMoviePrompt();
    }

    function showNextMoviePrompt() {
      const player = players[currentMovieIndex];
      moviePromptEl.textContent = `${player.name}, what’s your guilty-pleasure movie?`;
      movieTitleInput.value = '';
      movieTitleInput.disabled = false;
      movieTitleInput.focus();
      searchResultsEl.innerHTML = '';
      isSelecting = false;
      // Reset buttons for new player
      confirmBtn.disabled = true;
      searchBtn.disabled = false;
    }

    // SEARCH: lookup movies.json and render radio list
    searchBtn.addEventListener('click', () => {
      const title = movieTitleInput.value.trim();
      if (!title) return;
      // normalize and search
      const normalize = str => str.toLowerCase().replace(/[^a-z0-9]/g, '');
      const searchNorm = normalize(title);
      currentMatches = moviesData
        .filter(m => normalize(m.primaryTitle).includes(searchNorm))
        .sort((a, b) => b.numVotes - a.numVotes)
        .slice(0, 10);

      if (currentMatches.length === 0) {
        searchResultsEl.innerHTML = '<p>No matches found. Please refine your title.</p>';
        confirmBtn.disabled = true;
        return;
      }

      // render matches
      searchResultsEl.innerHTML = currentMatches.map((m, idx) =>
        `<label><input type="radio" name="match" value="${idx}" /> ` +
        `${m.primaryTitle} (${m.startYear || 'N/A'}) — Rating: ${m.averageRating.toFixed(1)} — ${m.runtimeMinutes}m</label>`
      ).join('');
      confirmBtn.disabled = true; // remain disabled until a choice
    });

    // ENABLE Confirm only after a radio is selected
    searchResultsEl.addEventListener('change', e => {
      if (e.target.name === 'match') {
        confirmBtn.disabled = false;
      }
    });

    // CONFIRM: save selection and advance
    confirmBtn.addEventListener('click', () => {
      const sel = document.querySelector('input[name="match"]:checked');
      if (!sel) return;
      const match = currentMatches[parseInt(sel.value, 10)];
      movies.push({ name: players[currentMovieIndex].name, ...match });
      currentMovieIndex++;
      confirmBtn.disabled = true;
      searchResultsEl.innerHTML = '';
      movieTitleInput.value = '';
      if (currentMovieIndex >= players.length) {
        movieEntryEl.classList.add('hidden');
        initQuiz();
      } else {
        showNextMoviePrompt();
      }
    });

    // Start the Quiz
    function initQuiz() {
      currentMovieIndex = 0;
      // Initialize correctness flags
      movies.forEach(m => {
        m.correctYear = false;
        m.correctRating = false;
      });
      quizEl.classList.remove('hidden');
      showNextQuiz();
    }

    function showNextQuiz() {
      if (currentMovieIndex >= movies.length) {
        quizEl.classList.add('hidden');
        showResults();
        return;
      }
      const mov = movies[currentMovieIndex];
      yearPromptEl.textContent = `What Year was "${mov.primaryTitle}" released?`;
      ratingPromptEl.textContent = `What Rating out of 10 does "${mov.primaryTitle}" have?`;
      const tbody = quizEl.querySelector('tbody');
      tbody.innerHTML = `
        <tr><th>Player</th><td>${mov.name}</td></tr>
        <tr><th>Movie Title</th><td>${mov.primaryTitle}</td></tr>
        <tr><th>Year</th><td>${mov.startYear || 'N/A'}</td></tr>
        <tr><th>Rating</th><td>${mov.averageRating.toFixed(1)}</td></tr>
        <tr><th>Correct Year</th><td><input type="checkbox" id="yearChk" /></td></tr>
        <tr><th>Correct Rating</th><td><input type="checkbox" id="ratingChk" /></td></tr>
      `;
    }

    document.getElementById('nextQuizBtn').addEventListener('click', () => {
      const mov = movies[currentMovieIndex];
      mov.correctYear = document.getElementById('yearChk').checked;
      mov.correctRating = document.getElementById('ratingChk').checked;
      currentMovieIndex++;
      showNextQuiz();
    });

    function showResults() {
      const resultsList = document.getElementById('resultsList');
      // Calculate points and include movie titles and rating
      const scores = players.map(p => {
        const entry = movies.find(m => m.name === p.name);
        const points = (entry.correctYear ? 1 : 0) + (entry.correctRating ? 1 : 0);
        return { name: p.name, title: entry.primaryTitle, rating: entry.averageRating, points };
      });
      // Sort ascending by IMDb rating
      scores.sort((a, b) => a.rating - b.rating);
      // Render as table
      resultsList.innerHTML = `
        <table>
          <thead>
            <tr><th>Player</th><th>Movie Title</th><th>Rating</th><th>Score</th></tr>
          </thead>
          <tbody>
            ${scores.map(s =>
        `<tr><td>${s.name}</td><td>${s.title}</td><td>${s.rating.toFixed(1)}</td><td>${s.points}</td></tr>`
      ).join('')}
          </tbody>
        </table>
      `;
      resultsEl.classList.remove('hidden');
      document.getElementById('restartBtn').addEventListener('click', () => {
        resultsEl.classList.add('hidden');
        lobbyEl.classList.remove('hidden');
      });
    }
  </script>

</body>

</html>
